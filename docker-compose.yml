version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: job-portal-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Abrar@123
      POSTGRES_DB: job_portal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d job_portal"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: job-portal-backend
    restart: always
    command: sh -c "node docker-setup.js && npm run dev"
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=Abrar@123
      - DB_NAME=job_portal
      - PORT=5000
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: job-portal-frontend
    restart: always
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend

  admin-panel:
    build:
      context: ./admin-panel
      dockerfile: Dockerfile
    container_name: job-portal-admin-panel
    restart: always
    volumes:
      - ./admin-panel:/app
      - /app/node_modules
    ports:
      - "3001:3001"
    depends_on:
      - backend

volumes:
  postgres_data:
